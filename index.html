<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherion Gems</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.css" />
</head>
<body>
    <header class="hero" data-aos="fade-in">
        <h1>Welcome to Aetherion Gems</h1>
        <p>Discover the essence of mystical gems.</p>
    </header>

    <section class="origin" data-aos="fade-up">
        <h2>Origin</h2>
        <p>The Aetherion gems have a rich history...</p>
    </section>

    <section class="essence" data-aos="fade-up">
        <h2>Essence</h2>
        <p>Dive into the unique characteristics of each gem...</p>
    </section>

    <section class="craft" data-aos="fade-up">
        <h2>Craft</h2>
        <p>Learn how to craft these beautiful gems...</p>
    </section>

    <section class="gallery" data-aos="fade-up">
        <h2>Gallery</h2>
        <div class="gallery-collection">
            <img src="gem1.jpg" alt="Gem 1">
            <img src="gem2.jpg" alt="Gem 2">
            <img src="gem3.jpg" alt="Gem 3">
            <!-- Additional images can be added here -->
        </div>
    </section>

    <script>
        AOS.init(); // Initialize AOS for scroll reveal animations
    </script>
</body>
</html>
